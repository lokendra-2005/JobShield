<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobShield – Opening Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #000;
    }

    /* ─── Stage ───────────────────────────────────────────────────── */
    #stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       PHASE 1 – Background (0 → 1.5 s)
    ═══════════════════════════════════════════════════════════════ */
    #bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, #0a1a3a 0%, #050d20 60%, #020810 100%);
      opacity: 0;
      animation: bgFadeIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0s forwards;
    }

    /* subtle grid overlay */
    #bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0;
      animation: bgFadeIn 2s ease 0.5s forwards;
    }

    /* ambient cyan glow at top */
    #bg::after {
      content: '';
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
      opacity: 0;
      animation: bgFadeIn 2s ease 0.8s forwards;
    }

    @keyframes bgFadeIn {
      to { opacity: 1; }
    }

    /* ─── Particle canvas ─────────────────────────────────────────── */
    #particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      animation: bgFadeIn 1.5s ease 1s forwards;
    }

    /* ═══════════════════════════════════════════════════════════════
       PHASE 2 – Shield (1.5 → 3 s)
    ═══════════════════════════════════════════════════════════════ */
    #shield-wrap {
      position: relative;
      z-index: 10;
      width: 160px; height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.7) translateY(12px);
      animation: shieldIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s forwards;
      margin-bottom: 32px;
    }

    @keyframes shieldIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* outer energy ring */
    .energy-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(0,212,255,0.8) 20%,
        rgba(0,212,255,0) 40%,
        transparent 60%,
        rgba(0,212,255,0.5) 80%,
        transparent 100%
      ) border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      animation:
        ringAppear 0.5s ease 2s forwards,
        ringRotate 3s linear 2s infinite;
    }

    .energy-ring-2 {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid transparent;
      background: conic-gradient(
        from 180deg,
        transparent 0%,
        rgba(0,212,255,0.4) 25%,
        transparent 50%,
        rgba(0,212,255,0.2) 75%,
        transparent 100%
      ) border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      animation:
        ringAppear 0.5s ease 2.2s forwards,
        ringRotateReverse 4s linear 2.2s infinite;
    }

    @keyframes ringAppear { to { opacity: 1; } }
    @keyframes ringRotate { to { transform: rotate(360deg); } }
    @keyframes ringRotateReverse { to { transform: rotate(-360deg); } }

    /* shield SVG */
    #shield-svg {
      width: 120px; height: 120px;
      filter:
        drop-shadow(0 0 18px rgba(0,212,255,0.6))
        drop-shadow(0 0 40px rgba(0,212,255,0.25));
      animation: shieldPulse 2.5s ease-in-out 2s infinite;
    }

    @keyframes shieldPulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 18px rgba(0,212,255,0.6))
          drop-shadow(0 0 40px rgba(0,212,255,0.25));
      }
      50% {
        filter:
          drop-shadow(0 0 30px rgba(0,212,255,0.9))
          drop-shadow(0 0 60px rgba(0,212,255,0.45))
          drop-shadow(0 0 90px rgba(0,212,255,0.15));
      }
    }

    /* inner shield glow fill */
    .shield-fill {
      fill: url(#shieldGrad);
    }
    .shield-stroke {
      fill: none;
      stroke: url(#cyanGrad);
      stroke-width: 2.5;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: strokeDraw 1s ease 1.8s forwards;
    }
    @keyframes strokeDraw {
      to { stroke-dashoffset: 0; }
    }

    /* lock icon inside shield */
    .lock-path {
      fill: rgba(0,212,255,0.9);
      opacity: 0;
      animation: lockAppear 0.6s ease 2.4s forwards;
    }
    @keyframes lockAppear {
      0%   { opacity:0; transform: scale(0.6); }
      100% { opacity:1; transform: scale(1); }
    }

    /* ═══════════════════════════════════════════════════════════════
       PHASE 3 – Logo text (3 → 4 s)
    ═══════════════════════════════════════════════════════════════ */
    #logo {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: baseline;
      gap: 0;
      opacity: 0;
      transform: translateY(16px);
      animation: logoUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 3s forwards;
      margin-bottom: 14px;
    }

    @keyframes logoUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #logo .word-job {
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 800;
      letter-spacing: -1px;
      color: #ffffff;
      text-shadow:
        0 0 30px rgba(255,255,255,0.15),
        0 2px 12px rgba(0,0,0,0.4);
    }

    #logo .word-shield {
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 60%, #00eeff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 16px rgba(0,212,255,0.5));
    }

    /* animated underline */
    #logo-underline {
      position: absolute;
      bottom: -6px;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, rgba(0,212,255,0.3), transparent);
      transform: scaleX(0);
      transform-origin: left;
      animation: underlineIn 0.6s ease 3.5s forwards;
    }
    @keyframes underlineIn {
      to { transform: scaleX(1); }
    }

    /* ─── Typing cursor effect on "Job" ───────────────────────────── */
    #logo .word-job::after {
      content: '';
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: #00d4ff;
      margin-left: 2px;
      vertical-align: middle;
      border-radius: 2px;
      animation: cursorBlink 0.6s step-end 3s 4, cursorFade 0.3s ease 5.4s forwards;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes cursorFade {
      to { opacity: 0; width: 0; margin: 0; }
    }

    /* ═══════════════════════════════════════════════════════════════
       PHASE 4 – Tagline (4 → 5 s)
    ═══════════════════════════════════════════════════════════════ */
    #tagline-wrap {
      position: relative;
      z-index: 10;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: taglineUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 4s forwards;
    }

    @keyframes taglineUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #tagline {
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(180, 220, 240, 0.75);
      text-shadow: 0 0 20px rgba(0,212,255,0.2);
    }

    /* small decorative dots flanking tagline */
    #tagline-wrap .deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .deco-line {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5));
    }
    .deco-line:last-child {
      transform: scaleX(-1);
    }
    .deco-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 8px rgba(0,212,255,0.8);
    }

    /* ─── Version badge ───────────────────────────────────────────── */
    #version {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(0,212,255,0.3);
      opacity: 0;
      animation: bgFadeIn 1s ease 4.5s forwards;
    }

    /* ─── Replay button (shows after 5.5 s) ──────────────────────── */
    #replay {
      position: absolute;
      bottom: 52px;
      right: 32px;
      z-index: 20;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.35);
      color: rgba(0,212,255,0.8);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
      animation: bgFadeIn 0.5s ease 5.5s forwards;
    }
    #replay:hover {
      background: rgba(0,212,255,0.2);
      border-color: rgba(0,212,255,0.7);
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <div id="stage">

    <!-- Background -->
    <div id="bg"></div>

    <!-- Particle canvas -->
    <canvas id="particles"></canvas>

    <!-- Shield -->
    <div id="shield-wrap">
      <div class="energy-ring"></div>
      <div class="energy-ring-2"></div>

      <svg id="shield-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <defs>
          <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#0d2a4a" />
            <stop offset="50%"  stop-color="#0a1f36" />
            <stop offset="100%" stop-color="#051525" />
          </linearGradient>
          <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#00eeff" />
            <stop offset="60%"  stop-color="#00b4d8" />
            <stop offset="100%" stop-color="#0077a8" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Shield body fill -->
        <path class="shield-fill"
          d="M50 4 L88 18 L88 52 Q88 80 50 106 Q12 80 12 52 L12 18 Z" />

        <!-- Shield border stroke (draws on) -->
        <path class="shield-stroke"
          d="M50 4 L88 18 L88 52 Q88 80 50 106 Q12 80 12 52 L12 18 Z" />

        <!-- Lock body -->
        <g class="lock-path" filter="url(#glow)">
          <!-- lock shackle -->
          <path d="M38 50 Q38 36 50 36 Q62 36 62 50 L62 54 L38 54 Z"
            fill="none" stroke="rgba(0,212,255,0.9)" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"
            class="lock-path" style="fill:none;"/>
          <!-- lock box -->
          <rect x="33" y="54" width="34" height="26" rx="4"
            fill="url(#cyanGrad)" opacity="0.85"
            class="lock-path" style="opacity:0;animation:lockAppear 0.6s ease 2.4s forwards;"/>
          <!-- keyhole -->
          <circle cx="50" cy="64" r="4" fill="#050d20" opacity="0"
            style="animation:lockAppear 0.6s ease 2.6s forwards;"/>
          <rect x="48" y="64" width="4" height="8" rx="2" fill="#050d20" opacity="0"
            style="animation:lockAppear 0.6s ease 2.6s forwards;"/>
        </g>

        <!-- inner cyan shine horizontal line -->
        <line x1="26" y1="30" x2="74" y2="30"
          stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
      </svg>
    </div>

    <!-- Logo -->
    <div id="logo">
      <span class="word-job">Job</span>
      <span class="word-shield">Shield</span>
      <div id="logo-underline"></div>
    </div>

    <!-- Tagline -->
    <div id="tagline-wrap">
      <div class="deco">
        <span class="deco-line"></span>
        <span class="deco-dot"></span>
        <span class="deco-line"></span>
      </div>
      <p id="tagline">Verify First. Trust Always. Stay Protected.</p>
    </div>

    <!-- Version -->
    <div id="version">JOBSHIELD &nbsp;v1.0 &nbsp;·&nbsp; CYBERSECURITY CAREER PROTECTION</div>

    <!-- Replay -->
    <button id="replay" onclick="location.reload()">↺ &nbsp;Replay</button>

  </div>

  <script>
    /* ──────────────────────────────────────────────────────────────
       Floating Particle System
    ────────────────────────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');

      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Particle class
      class Dot {
        constructor() { this.reset(true); }
        reset(initial = false) {
          this.x  = Math.random() * W;
          this.y  = initial ? Math.random() * H : H + 10;
          this.r  = Math.random() * 1.5 + 0.3;
          this.vy = -(Math.random() * 0.35 + 0.08);
          this.vx = (Math.random() - 0.5) * 0.15;
          this.a  = Math.random() * 0.5 + 0.15;
          this.life = 0;
          this.maxLife = Math.random() * 400 + 200;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.life++;
          if (this.y < -10 || this.life > this.maxLife) this.reset();
        }
        draw() {
          const fade = Math.min(this.life / 60, 1) * Math.min((this.maxLife - this.life) / 60, 1);
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,212,255,${this.a * fade})`;
          ctx.fill();
        }
      }

      // Spawn 80 particles
      for (let i = 0; i < 80; i++) particles.push(new Dot());

      function loop() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
      }
      loop();
    })();

    /* ──────────────────────────────────────────────────────────────
       Enable replay button pointer-events after animation ends
    ────────────────────────────────────────────────────────────── */
    setTimeout(() => {
      document.getElementById('replay').style.pointerEvents = 'auto';
    }, 5500);
  </script>
</body>
</html>
